<!--
  Template: terminal (横屏族 / horizontal family)
  风格: 终端黑 - 纯黑 + 等宽荧光字 + 扫描线 + 光标 (CRT / 黑客 / CLI)
  支持比例: 16:9 (1920×1080, 默认) / 16:10 (1920×1200, 把 --cv-h 改 1200px)
  适配: YouTube / Bilibili / 横屏短视频 ; 竖屏用 terminal-vertical.html
  identity test: ①纯黑底 ②全等宽字体 ③绿/琥珀荧光色带 text-shadow glow ④有扫描线 + 命令提示符 + 闪烁光标块
  换琥珀色: 把 --term 改 #ffb000

  默认精简版 (element budget ≤ 5,见 SKILL.md 原则 1):
    出厂只放 4 个元素 - kicker(.top) + 命令提示符+主标题(.prompt + .title) + 副标(.sub) + 一处署名(.foot .name)。
    扫描线 / 微辉 / 提示符 `:~$` / 闪烁光标块都是终端身份装置,保留。
    右上序号(.top 内 [ ● INDEX ]) / 提示符里的 ./EYEBROW 命令名 / 右下日期 默认不放;
    确有信息价值时,从 body 末尾「可选 opt-in」注释取用(CSS 已保留)。

  Customization points (替换占位符,改 CSS 变量):
    1. CSS :root - 改 --term 切荧光色(绿→琥珀 #ffb000);改 --cv-h 切 16:9 / 16:10
    2. .top 左 kicker - 品类 / 工具
    3. .title - 主标题,两个 <span class="stack"> 各一行,末尾保留 .cur 光标块
    4. .sub   - 中文副标题 (自带 // 注释前缀)
    5. .foot .name - 作者署名 + 频道名 (全图只此一处署名)
    可选 (默认不放): 右上 [ ● INDEX ] 序号 / 提示符命令名 ./EYEBROW / 右下日期
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="color-scheme" content="dark">
<title>{{TITLE}} · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--ink:#d7ffe3;--muted:#3f7a55;
  --term:#33ff77;--term-dim:#1f7a44;
  --font-mono:'JetBrains Mono',monospace;--font-zh:'Noto Sans SC',sans-serif;
  --cv-w:1920px; --cv-h:1080px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-mono);-webkit-font-smoothing:antialiased;}
.cover{width:var(--cv-w);height:var(--cv-h);position:relative;background:var(--bg);overflow:hidden;}
/* 扫描线 */
.cover::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(51,255,119,.05) 0 2px, transparent 2px 4px);}
/* 角落微辉 */
.cover::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(70% 80% at 50% 60%, rgba(51,255,119,.10), transparent 70%);}
.content{position:relative;z-index:5;padding:84px 96px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.top{display:flex;justify-content:space-between;align-items:center;font-size:24px;letter-spacing:.12em;color:var(--term-dim);}
.dot{color:var(--term);}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;}
.prompt{font-size:30px;letter-spacing:.05em;color:var(--term);margin-bottom:26px;}
.prompt .path{color:var(--term-dim);}
.title{font-weight:800;font-size:228px;line-height: 1.1;letter-spacing:-.01em;color:var(--term);text-shadow:0 0 28px rgba(51,255,119,.55);}
.title .stack{display:block;}
.title .cur{display:inline-block;width:.5em;height:.86em;background:var(--term);vertical-align:-.06em;margin-left:.12em;box-shadow:0 0 22px rgba(51,255,119,.7);}
.sub{font-family:var(--font-zh);font-weight:500;font-size:50px;line-height:1.2;margin-top:34px;color:var(--ink);}
.sub::before{content:"// ";color:var(--term-dim);}
.foot{display:flex;justify-content:space-between;align-items:center;font-size:24px;letter-spacing:.1em;color:var(--muted);}
.foot .name{font-family:var(--font-zh);color:var(--term);}
</style>
</head>
<body>
<div class="cover">
  <div class="content">
    <div class="top"><span>{{KICKER}}</span></div>
    <div class="hero">
      <div class="prompt"><span class="path">vsw@coder</span>:~$ </div>
      <h1 class="title"><span class="stack">{{TITLE_LINE_1}}</span><span class="stack">{{TITLE_LINE_2}}<span class="cur"></span></span></h1>
      <div class="sub">{{SUBTITLE_HTML}}</div>
    </div>
    <div class="foot"><span class="name">{{AUTHOR_NAME}} · {{CHANNEL}}</span></div>
  </div>

  <!-- 可选 opt-in (默认不放;承载信息时取用,CSS 已保留):
       右上序号    → .top 内 kicker span 后加: <span>[ <span class="dot">●</span> {{INDEX}} ]</span>
       提示符命令名 → .prompt 改成: <span class="path">vsw@coder</span>:~$ ./{{EYEBROW}}
       右下日期    → .foot 内 .name 后加: <span>{{DATE}}</span>
  -->
</div>
</body>
</html>
