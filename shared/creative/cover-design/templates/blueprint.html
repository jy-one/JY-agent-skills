<!--
  Template: blueprint (横屏族 / horizontal family)
  风格: 深蓝图 - 深藏青底 + 白色网格/线稿 + 等宽标注 (工程蓝图气质)
  支持比例: 16:9 (1920×1080, 默认) / 16:10 (1920×1200, 把 --cv-h 改 1200px)
  适配: YouTube / Bilibili / 横屏短视频 ; 竖屏用 blueprint-vertical.html
  identity test: ①深藏青/蓝图蓝底 ②白色细网格 (细线 + 主线两层) ③有线稿装饰 (角标尺/标注线/十字) ④等宽标注字, 标题描边或半透白

  默认精简版 (element budget ≤ 5,见 SKILL.md 原则 1):
    出厂只放 5 个元素 - kicker(.top span) + 主标题(.title) + 副标(.sub) + 一条蓝图标注线(.dimline,领域装置) + 一处署名(.foot .name)。
    网格线稿 + dimline 尺寸标注是蓝图身份语言,保留(网格不是可删的分隔线)。
    eyebrow / 右上 REV index / dimline 里的 date / 右下 DWG·index(第二处品牌标) 默认不放;
    确有信息价值时从 body 末尾「可选 opt-in」注释取用(CSS 已保留)。

  Customization points (替换占位符):
    1. .top span (kicker) - 顶部 kicker (品类 / 工具)
    2. .title - 主标题,两行 <span class="stack">,第二行可加 .alt 高亮
    3. .sub  - 中文副标题
    4. .foot .name - 作者署名 + 频道名 (全图只此一处署名)
    可选 (默认不放): .eyebrow(标题上方小字) / 右上 REV index / dimline date / 右下 DWG·index
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="color-scheme" content="dark">
<title>{{TITLE}} · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1f3c;--bg2:#0c2546;--ink:#eaf2ff;--ink-soft:#a9c2e6;--muted:#5f7aa6;
  --line:rgba(160,200,255,.16);--line-strong:rgba(160,200,255,.4);
  --accent:#7fd3ff;
  --font-display:'Inter','Noto Sans SC',sans-serif;--font-zh:'Noto Sans SC',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --cv-w:1920px; --cv-h:1080px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;}
.cover{width:var(--cv-w);height:var(--cv-h);position:relative;background:linear-gradient(135deg,var(--bg2),var(--bg));overflow:hidden;}
/* 细网格 + 主网格 */
.cover::before{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
   linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px),
   linear-gradient(var(--line-strong) 1.5px,transparent 1.5px),linear-gradient(90deg,var(--line-strong) 1.5px,transparent 1.5px);
  background-size:48px 48px,48px 48px,240px 240px,240px 240px;}
/* 左侧压暗，把网格从标题区域擦掉，托住文字 */
.cover::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg, rgba(7,20,40,.92) 0%, rgba(7,20,40,.74) 42%, rgba(7,20,40,.15) 72%, transparent 88%);}
.content{position:relative;z-index:5;padding:80px 96px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.top{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:23px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:86%;}
.eyebrow{font-family:var(--font-mono);font-size:24px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:24px;}
.eyebrow::before{content:"⌖ ";color:var(--accent);}
.title{font-weight:800;font-size:244px;line-height: 1.1;letter-spacing:-.02em;color:var(--ink);}
.title .stack{display:block;}
.title .alt{color:var(--accent);}
.sub{font-family:var(--font-mono);font-weight:400;font-size:46px;line-height:1.2;margin-top:34px;color:var(--ink-soft);font-family:var(--font-zh);}
.dimline{display:flex;align-items:center;gap:14px;margin-top:24px;color:var(--muted);font-family:var(--font-mono);font-size:22px;letter-spacing:.1em;}
.dimline .bar{flex:1;height:1px;background:var(--line-strong);position:relative;}
.dimline .bar::before,.dimline .bar::after{content:"";position:absolute;top:-5px;width:1px;height:11px;background:var(--line-strong);}
.dimline .bar::before{left:0;}.dimline .bar::after{right:0;}
.foot{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:23px;letter-spacing:.1em;color:var(--muted);}
.foot .name{font-family:var(--font-zh);color:var(--ink);font-weight:500;}
</style>
</head>
<body>
<div class="cover">
  <div class="content">
    <div class="top"><span>{{KICKER}}</span></div>
    <div class="hero">
      <h1 class="title"><span class="stack">{{TITLE_LINE_1}}</span><span class="stack alt">{{TITLE_LINE_2}}</span></h1>
      <div class="sub">{{SUBTITLE_HTML}}</div>
      <div class="dimline"><span>SCALE 1:1</span><span class="bar"></span><span>DWG</span></div>
    </div>
    <div class="foot"><span class="name">{{AUTHOR_NAME}} · {{CHANNEL}}</span></div>
  </div>

  <!-- 可选 opt-in (默认不放;承载信息时取用,CSS 已保留):
       标题上方小字  → .hero 内 <h1> 前加: <div class="eyebrow">{{EYEBROW}}</div>
       右上 REV index → .top 内 kicker span 后加: <span>REV {{INDEX}}</span>
       dimline date   → .dimline 末尾 <span>DWG</span> 换成 <span>{{DATE}}</span>
       右下 DWG·index → .foot 内 .name 后加: <span>DWG · {{INDEX}}</span>
  -->
</div>
</body>
</html>
