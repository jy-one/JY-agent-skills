<!--
  Template: neo-brutalism-vertical (竖屏族 / vertical family)
  风格: 新粗野 - 高饱和撞色 + 粗黑描边 + 硬阴影 + 圆角块
  支持比例: 9:16 (1080×1920, 默认) / 3:4 (1080×1440, 把 --cv-h 改 1440px)
  适配: 抖音 / 视频号 ; 文字收在中央安全带, body.show-guide 看显示带
  identity test 同 neo-brutalism.html

  默认精简版 (element budget ≤ 5,见 SKILL.md 原则 1):
    出厂只放 4 个元素 - kicker(.kicker) + 主标题(.title) + 副标(.sub) + 一处署名(.foot 作者+频道)。
    撞色块/粗黑描边/硬阴影 = 新粗野身份,保留(不是可删的装饰色块)。
    右上编号(.index) / eyebrow 默认不放;
    确有信息价值时从 body 末尾「可选 opt-in」注释取用(CSS 已保留)。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="color-scheme" content="light">
<title>{{TITLE}} · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Noto+Sans+SC:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffe14d;--panel:#ffffff;--ink:#111111;--accent:#ff4d2e;--accent2:#2e6bff;
  --font-display:'Archivo','Noto Sans SC',sans-serif;--font-zh:'Noto Sans SC',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --cv-w:1080px; --cv-h:1920px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;}
.cover{width:var(--cv-w);height:var(--cv-h);position:relative;background:var(--bg);overflow:hidden;padding:170px 72px;display:flex;flex-direction:column;gap:36px;}
.top{display:flex;justify-content:space-between;gap:20px;}
.kicker{background:var(--ink);color:#fff;font-family:var(--font-mono);font-weight:700;font-size:24px;letter-spacing:.1em;text-transform:uppercase;padding:14px 22px;border:5px solid var(--ink);box-shadow:8px 8px 0 var(--accent2);}
.index{background:var(--panel);font-family:var(--font-mono);font-weight:700;font-size:22px;letter-spacing:.08em;text-transform:uppercase;padding:14px 22px;border:5px solid var(--ink);box-shadow:8px 8px 0 var(--ink);}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;}
.eyebrow{align-self:flex-start;background:var(--accent);color:#fff;font-family:var(--font-mono);font-weight:700;font-size:24px;letter-spacing:.08em;text-transform:uppercase;padding:10px 18px;border:4px solid var(--ink);margin-bottom:28px;}
.title{font-weight:900;font-size:200px;line-height: 1.1;letter-spacing:-.03em;text-transform:lowercase;text-shadow:7px 7px 0 var(--accent);}
.title .stack{display:block;}
.title .alt{color:var(--panel);-webkit-text-stroke:5px var(--ink);text-shadow:7px 7px 0 var(--accent2);}
.sub{align-self:flex-start;margin-top:36px;background:var(--panel);font-family:var(--font-zh);font-weight:700;font-size:60px;line-height:1.12;padding:16px 24px;border:5px solid var(--ink);box-shadow:10px 10px 0 var(--ink);}
.sub .mark{color:var(--accent);}
.foot{display:flex;justify-content:space-between;align-items:center;background:var(--ink);color:#fff;font-family:var(--font-mono);font-weight:700;font-size:24px;padding:16px 24px;border:5px solid var(--ink);}
.foot .name{font-family:var(--font-zh);}
.foot .accent{color:var(--bg);}
.guide{display:none;position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1464px;border:3px dashed var(--ink);z-index:50;pointer-events:none;}
body.show-guide .guide{display:block;}
</style>
</head>
<body>
<div class="cover">
  <div class="guide"></div>
  <div class="top"><div class="kicker">{{KICKER}}</div></div>
  <div class="hero">
    <h1 class="title"><span class="stack">{{TITLE_LINE_1}}</span><span class="stack alt">{{TITLE_LINE_2}}</span></h1>
    <div class="sub">{{SUBTITLE_HTML}}</div>
  </div>
  <div class="foot"><span class="name">{{AUTHOR_NAME}}</span><span class="accent">{{CHANNEL}}</span></div>

  <!-- 可选 opt-in (默认精简不放;仅当承载信息时取用,CSS 已保留):
       右上编号块  → .top 内 .kicker 后加: <div class="index">{{INDEX}}</div>
       标题上方标签 → .hero 内 <h1> 前加: <div class="eyebrow">{{EYEBROW}}</div>
  -->
</div>
</body>
</html>
