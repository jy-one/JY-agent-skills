<!--
  Template: glass-dark-vertical (竖屏族 / vertical family)
  风格: 深色玻璃拟态 - 深底 + 磨砂玻璃面板 + 背后柔光
  支持比例: 9:16 (1080×1920, 默认) / 3:4 (1080×1440, 把 --cv-h 改 1440px)
  适配: 抖音 / 视频号 竖屏短视频 ; 横屏用 glass-dark.html
  文字收在中央安全带 (加 body.show-guide 看辅助线)
  identity test 同 glass-dark.html

  默认精简版 (element budget ≤ 5,见 SKILL.md 原则 1):
    出厂只放 4 个元素 - kicker(.top 内 kicker) + 主标题(.title) + 副标(.sub) + 一处署名(.foot .name)。
    右上序号(.top 内 index) / 玻璃面板内 eyebrow / 右下日期 默认不放;
    确有信息价值时,从 body 末尾「可选 opt-in」注释取用(CSS 已保留)。玻璃面板 + 柔光是身份装置,保留。

  Customization points (替换占位符,改 CSS 变量):
    1. CSS :root - 改 --bg / --g1~3 调底色与柔光;改 --cv-h 切 9:16 / 3:4
    2. .top 内 kicker - 顶部 kicker (品类 / 工具)
    3. .title - 主标题大字,两个 <span class="stack"> 各一行,第二行 .alt 走渐变
    4. .sub   - 中文副标题
    5. .foot .name - 作者署名 + 频道名 (全图只此一处署名)
    可选 (默认不放): 右上序号(index) / .eyebrow(面板内小字) / 右下日期
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="color-scheme" content="dark">
<title>{{TITLE}} · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b16;--ink:#f1f4fb;--ink-soft:#b9c2d6;--muted:#7b85a0;
  --g1:#3b82f6;--g2:#8b5cf6;--g3:#22d3ee;--accent:#9db4ff;
  --font-display:'Inter','Noto Sans SC',sans-serif;--font-zh:'Noto Sans SC',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --cv-w:1080px; --cv-h:1920px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;}
.cover{width:var(--cv-w);height:var(--cv-h);position:relative;overflow:hidden;background:
  radial-gradient(60% 40% at 20% 16%, rgba(59,130,246,.55), transparent 60%),
  radial-gradient(55% 40% at 86% 30%, rgba(139,92,246,.5), transparent 60%),
  radial-gradient(70% 40% at 60% 92%, rgba(34,211,238,.35), transparent 60%),
  var(--bg);}
.content{position:relative;z-index:5;padding:90px 72px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:64px;}
.top{position:absolute;top:90px;left:72px;right:72px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:26px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.hero{background:rgba(255,255,255,.07);backdrop-filter:blur(42px) saturate(140%);-webkit-backdrop-filter:blur(42px) saturate(140%);
  border:1px solid rgba(255,255,255,.18);border-radius:36px;padding:66px 60px;
  box-shadow:0 40px 120px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.35);}
.eyebrow{font-family:var(--font-mono);font-size:28px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:30px;}
.title{font-weight:600;font-size:236px;line-height: 1.08;letter-spacing:-.03em;color:var(--ink);}
.title .stack{display:block;}
.title .alt{background:linear-gradient(110deg,var(--g3),var(--g1) 50%,var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.sub{font-family:var(--font-zh);font-weight:400;font-size:56px;line-height:1.2;margin-top:36px;color:var(--ink-soft);}
.foot{position:absolute;bottom:90px;left:72px;right:72px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:26px;letter-spacing:.1em;color:var(--muted);}
.foot .name{font-family:var(--font-zh);color:var(--ink);font-weight:500;}
.guide{position:absolute;left:40px;right:40px;top:228px;bottom:228px;border:2px dashed rgba(255,120,120,.7);display:none;z-index:9;}
body.show-guide .guide{display:block;}
</style>
</head>
<body>
<div class="cover">
  <div class="top"><span>{{KICKER}}</span></div>
  <div class="content">
    <div class="hero">
      <h1 class="title"><span class="stack">{{TITLE_LINE_1}}</span><span class="stack alt">{{TITLE_LINE_2}}</span></h1>
      <div class="sub">{{SUBTITLE_HTML}}</div>
    </div>
  </div>
  <div class="foot"><span class="name">{{AUTHOR_NAME}} · {{CHANNEL}}</span></div>
  <div class="guide"></div>

  <!-- 可选 opt-in (默认不放;承载信息时取用,CSS 已保留):
       右上序号  → .top 内 kicker span 后加: <span>{{INDEX}}</span>
       面板内小字 → .hero 内 <h1> 前加: <div class="eyebrow">{{EYEBROW}}</div>
       右下日期  → .foot 内 .name 后加: <span>{{DATE}}</span>
  -->
</div>
</body>
</html>
