<!--
  Template: bauhaus-vertical (竖屏族 / vertical family)
  风格: 包豪斯 - 米白底 + 红黄蓝色块 + 圆/三角/方几何 + 粗网格 + 几何无衬线
  支持比例: 9:16 (1080×1920, 默认) / 3:4 (1080×1440, 把 --cv-h 改 1440px)
  适配: 抖音 / 视频号 ; 文字收在中央安全带, body.show-guide 看显示带
  identity test 同 bauhaus.html

  默认精简版 (element budget ≤ 5,见 SKILL.md 原则 1):
    出厂只放 4 个元素 - kicker(.kicker) + 主标题(.title) + 副标(.sub) + 一处署名(.foot 作者+频道)。
    红黄蓝几何色块(.geo) + 粗网格细线 = 包豪斯身份,保留(不是可删的装饰色块)。
    右上编号(.index) / eyebrow 默认不放;
    确有信息价值时从 body 末尾「可选 opt-in」注释取用(CSS 已保留)。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><meta name="color-scheme" content="light">
<title>{{TITLE}} · Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2ece1;--ink:#1a1a1a;--red:#e63329;--yellow:#f7c52b;--blue:#1f4ed8;
  --font-display:'Poppins','Noto Sans SC',sans-serif;--font-zh:'Noto Sans SC',sans-serif;
  --cv-w:1080px; --cv-h:1920px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-display);-webkit-font-smoothing:antialiased;}
.cover{width:var(--cv-w);height:var(--cv-h);position:relative;background:var(--bg);overflow:hidden;}
.geo{position:absolute;z-index:1;}
.g-circle{top:80px;right:-120px;width:420px;height:420px;border-radius:50%;background:var(--blue);}
.g-tri{top:60px;left:0;width:0;height:0;border-right:240px solid transparent;border-top:220px solid var(--yellow);}
.g-bar{bottom:260px;left:0;width:100%;height:30px;background:var(--ink);}
.g-sq{bottom:120px;right:72px;width:200px;height:200px;background:var(--red);}
.content{position:relative;z-index:5;padding:170px 72px;height:100%;display:flex;flex-direction:column;}
.top{display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid var(--ink);padding-bottom:20px;}
.kicker{font-weight:700;font-size:26px;letter-spacing:.1em;text-transform:uppercase;}
.kicker .sq{display:inline-block;width:18px;height:18px;background:var(--red);margin-right:12px;vertical-align:middle;}
.index{font-weight:600;font-size:22px;letter-spacing:.08em;text-transform:uppercase;}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;}
.eyebrow{font-weight:600;font-size:26px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:26px;}
.title{font-weight:800;font-size:206px;line-height: 1.1;letter-spacing:-.03em;text-transform:lowercase;}
.title .stack{display:block;}
.title .alt{color:var(--red);}
.sub{font-family:var(--font-zh);font-weight:700;font-size:62px;line-height:1.14;margin-top:34px;}
.sub .mark{color:var(--bg);background:var(--blue);padding:0 .14em;}
.foot{display:flex;justify-content:space-between;align-items:center;border-top:4px solid var(--ink);padding-top:20px;font-weight:600;font-size:24px;letter-spacing:.05em;}
.foot .name{font-family:var(--font-zh);font-weight:700;}
.guide{display:none;position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:1464px;border:3px dashed var(--ink);z-index:60;pointer-events:none;}
body.show-guide .guide{display:block;}
</style>
</head>
<body>
<div class="cover">
  <div class="geo g-circle"></div>
  <div class="geo g-tri"></div>
  <div class="geo g-bar"></div>
  <div class="geo g-sq"></div>
  <div class="guide"></div>
  <div class="content">
    <div class="top"><div class="kicker"><span class="sq"></span>{{KICKER}}</div></div>
    <div class="hero">
      <h1 class="title"><span class="stack">{{TITLE_LINE_1}}</span><span class="stack alt">{{TITLE_LINE_2}}</span></h1>
      <div class="sub">{{SUBTITLE_HTML}}</div>
    </div>
    <div class="foot"><span class="name">{{AUTHOR_NAME}}</span><span>{{CHANNEL}}</span></div>
  </div>

  <!-- 可选 opt-in (默认精简不放;仅当承载信息时取用,CSS 已保留):
       右上编号    → .top 内 .kicker 后加: <div class="index">{{INDEX}}</div>
       标题上方小字 → .hero 内 <h1> 前加: <div class="eyebrow">{{EYEBROW}}</div>
  -->
</div>
</body>
</html>
